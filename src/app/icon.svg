<svg xmlns="http://www.w3.org/2000/svg" viewBox="10 15 80 80" role="img" aria-label="eurovisionmaxxing logo">
  <!--
    Same 9-bar heart as src/components/ui/Logo.tsx, but as a standalone
    asset. Colors are hardcoded to the dark-mode palette values from
    SPEC §3.1 (globals.css) because static SVGs can't read CSS variables.
    If the SPEC palette changes, regenerate this file + the PNG variants.
  -->
  <defs>
    <linearGradient id="emx-icon-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0c040"/>
      <stop offset="100%" stop-color="#ff3eaa"/>
    </linearGradient>
  </defs>
  <g fill="url(#emx-icon-grad)">
    <rect x="17"   y="56" width="6" height="3"    rx="3" ry="3"/>
    <rect x="24.5" y="35" width="6" height="33"   rx="3" ry="3"/>
    <rect x="32"   y="26" width="6" height="49.5" rx="3" ry="3"/>
    <rect x="39.5" y="35" width="6" height="45"   rx="3" ry="3"/>
    <rect x="47"   y="50" width="6" height="33"   rx="3" ry="3"/>
    <rect x="54.5" y="35" width="6" height="45"   rx="3" ry="3"/>
    <rect x="62"   y="26" width="6" height="49.5" rx="3" ry="3"/>
    <rect x="69.5" y="35" width="6" height="33"   rx="3" ry="3"/>
    <rect x="77"   y="56" width="6" height="3"    rx="3" ry="3"/>
  </g>
</svg>
